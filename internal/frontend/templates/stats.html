<div class="stats-container">
    <h2>Server Stats</h2>
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Status</h3>
            <p>{{.Status}}</p>
        </div>
        <div class="stat-card">
            <h3>Version</h3>
            <p>{{.Version}}</p>
        </div>
        <div class="stat-card">
            <h3>Reset Date</h3>
            <p>{{.Reset}}</p>
        </div>
        <div class="stat-card">
            <h3>Next Reset</h3>
            <p>{{.NextReset}}</p>
        </div>
        <div class="stat-card">
            <h3>Agents</h3>
            <p>{{.Agents}}</p>
        </div>
        <div class="stat-card">
            <h3>Ships</h3>
            <p>{{.Ships}}</p>
        </div>
        <div class="stat-card">
            <h3>Systems</h3>
            <p>{{.Systems}}</p>
        </div>
        <div class="stat-card">
            <h3>Waypoints</h3>
            <p>{{.Waypoints}}</p>
        </div>
        <div class="stat-card">
            <h3>Last Market Update</h3>
            <p>{{.MarketUpdate}}</p>
        </div>
    </div>
</div>
