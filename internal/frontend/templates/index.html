<!DOCTYPE html>
<html lang="en">
    <head>

    </head>

            </p>

        <script>
            const AGENT_STORAGE_KEY = 'selected-agents';
            const MY_AGENT_KEY = 'my-agent';
            const SIDEBAR_COLLAPSED_KEY = 'sidebar-collapsed';
            const CLASS_SELECTED = 'agent-selected';
            const CLASS_UNSELECTED = 'agent-unselected';

            function getMyAgentForHxVals() {
                return localStorage.getItem(MY_AGENT_KEY) || '';
            }

            (function() {
                var originalInit = echarts.init;
                window.__echartsInstances__ = [];
                echarts.init = function() {
                    var instance = originalInit.apply(this, arguments);
                    window.__echartsInstances__.push(instance);
                    return instance;
                };
            })();

            function resizeAllCharts() {
                if (window.__echartsInstances__) {
                    window.__echartsInstances__.forEach(function(inst) {
                        try { inst.resize(); } catch(e) {}
                    });
                }
            }

            // Sidebar Logic
            document.addEventListener('DOMContentLoaded', () => {
                const appContainer = document.getElementById('app-container');
                const sidebar = document.getElementById('sidebar');
                const toggleBtn = document.getElementById('toggle-sidebar');
                const closeBtn = document.getElementById('close-sidebar');
                const collapseBtn = document.getElementById('sidebar-toggle');

                const isMobile = () => window.innerWidth <= 768;

                // Restore persisted collapsed state on desktop
                if (!isMobile() && appContainer) {
                    const collapsed = localStorage.getItem(SIDEBAR_COLLAPSED_KEY) === 'true';
                    if (collapsed) {
                        appContainer.classList.add('sidebar-collapsed');
                    }
                }

                if (toggleBtn) {
                    toggleBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (sidebar) {
                            sidebar.classList.toggle('open');
                        }
                    });
                }

                if (collapseBtn && appContainer) {
                    const sidebar = document.getElementById('sidebar');
                    collapseBtn.addEventListener('click', () => {
                        appContainer.classList.toggle('sidebar-collapsed');
                        localStorage.setItem(SIDEBAR_COLLAPSED_KEY, 
                            appContainer.classList.contains('sidebar-collapsed'));
                        if (sidebar) {
                            var onEnd = function(e) {
                                if (e.target === sidebar && e.propertyName === 'width') {
                                    sidebar.removeEventListener('transitionend', onEnd);
                                    resizeAllCharts();
                                }
                            };
                            sidebar.addEventListener('transitionend', onEnd);
                        }
                    });
                }

                if (closeBtn && sidebar) {
                    closeBtn.addEventListener('click', () => {
                        sidebar.classList.remove('open');
                    });
                }

                // Close sidebar when a link is clicked (on mobile)
                if (sidebar) {
                    sidebar.addEventListener('click', (e) => {
                        if (isMobile() && e.target.closest('.nav-link')) {
                            sidebar.classList.remove('open');
                        }
                    });
                }

                // Close sidebar when clicking outside on mobile
                document.addEventListener('click', (e) => {
                    if (isMobile() && 
                        sidebar && sidebar.classList.contains('open') &&
                        !sidebar.contains(e.target) && 
                        (!toggleBtn || !toggleBtn.contains(e.target))) {
                        sidebar.classList.remove('open');
                    }
                });
            });
            function toggleAgentSelection(agentName) {
                const agentButton = document.getElementById(`btn-${agentName}`);

                if (!agentButton) {
                    console.error(`Button for agent ${agentName} not found.`);
                    return;
                }

                let selectedAgents = (localStorage.getItem(AGENT_STORAGE_KEY) || '').split(',').filter(Boolean);
                const agentIndex = selectedAgents.indexOf(agentName);
                const isCurrentlySelected = agentIndex > -1;

                let newAction; // 'add' or 'remove'

                if (isCurrentlySelected) {
                    // Agent is currently selected -> REMOVE it
                    selectedAgents.splice(agentIndex, 1);
                    newAction = 'remove';
                } else {
                    // Agent is NOT selected -> ADD it
                    selectedAgents.push(agentName);
                    newAction = 'add';
                }

                localStorage.setItem(AGENT_STORAGE_KEY, selectedAgents.join(','));

                if (newAction === 'add') {
                    agentButton.classList.add(CLASS_SELECTED);
                    agentButton.classList.remove(CLASS_UNSELECTED);
                } else { // 'remove'
                    agentButton.classList.add(CLASS_UNSELECTED);
                    agentButton.classList.remove(CLASS_SELECTED);
                }

                console.log(`Agent ${agentName} ${newAction}ed. Stored list: ${selectedAgents.join(',')}`);
            }

            function clearAgentSelections() {
                localStorage.removeItem(AGENT_STORAGE_KEY);
                htmx.trigger('body', 'refresh-vals');
                htmx.trigger('#agent-grid', 'refresh');
            }

            function getStoredAgentsForHxVals() {
                const savedAgents = localStorage.getItem(AGENT_STORAGE_KEY) || '';
                return `${savedAgents}`;
            }

            document.addEventListener('htmx:afterSwap', function() {
                setTimeout(resizeAllCharts, 50);
            });
            window.addEventListener('resize', resizeAllCharts);
        </script>
    </body>
</html>
